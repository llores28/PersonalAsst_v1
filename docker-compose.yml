services:
  # ─── Core Application ───
  assistant:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: personal-assistant
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OWNER_TELEGRAM_ID=${OWNER_TELEGRAM_ID}
      - DATABASE_URL=postgresql+asyncpg://assistant:${DB_PASSWORD}@postgres:5432/assistant
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - MODEL_ORCHESTRATOR=${MODEL_ORCHESTRATOR:-gpt-5.4}
      - MODEL_CODE_GEN=${MODEL_CODE_GEN:-gpt-5.4-mini}
      - MODEL_CODING=${MODEL_CODING:-gpt-5.4-mini}
      - MODEL_FAST=${MODEL_FAST:-gpt-5.4-nano}
      - MODEL_GENERAL=${MODEL_GENERAL:-gpt-5.4-mini}
      - MODEL_SAFETY=${MODEL_SAFETY:-gpt-5.4-nano}
      - MODEL_REFLECTOR=${MODEL_REFLECTOR:-gpt-5.4-nano}
      - MODEL_REPAIR=${MODEL_REPAIR:-gpt-5.4-mini}
      - MODEL_ROUTING=${MODEL_ROUTING:-gpt-5.4-nano}
      - DEFAULT_REASONING_EFFORT=${DEFAULT_REASONING_EFFORT:-medium}
      - DAILY_COST_CAP_USD=${DAILY_COST_CAP_USD:-5.00}
      - MONTHLY_COST_CAP_USD=${MONTHLY_COST_CAP_USD:-100.00}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_IMAGE_ENABLED=${OPENROUTER_IMAGE_ENABLED:-false}
      - OPENROUTER_DAILY_COST_CAP_USD=${OPENROUTER_DAILY_COST_CAP_USD:-5.00}
      - DEFAULT_ASSISTANT_NAME=${DEFAULT_ASSISTANT_NAME:-Atlas}
      - DEFAULT_PERSONA_STYLE=${DEFAULT_PERSONA_STYLE:-friendly}
      - DEFAULT_TIMEZONE=${DEFAULT_TIMEZONE:-America/New_York}
      - MAX_TOOL_CALLS_PER_REQUEST=${MAX_TOOL_CALLS_PER_REQUEST:-20}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS:-120}
      - TOOL_SUBPROCESS_TIMEOUT=${TOOL_SUBPROCESS_TIMEOUT:-30}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      # Forwarded so settings.workspace_mcp_signing_key is populated and the
      # startup-warning hook in src/main.py:_check_workspace_mcp_persistence
      # can detect a missing key. The actual encryption happens in the
      # workspace-mcp container, but the assistant validates configuration.
      - WORKSPACE_MCP_SIGNING_KEY=${WORKSPACE_MCP_SIGNING_KEY:-}
      - WORKSPACE_MCP_URL=http://workspace-mcp:8000/mcp
      - LINKEDIN_EMAIL=${LINKEDIN_EMAIL:-}
      - LINKEDIN_PASSWORD=${LINKEDIN_PASSWORD:-}
      - ONEDRIVE_ACCESS_TOKEN=${ONEDRIVE_ACCESS_TOKEN:-}
      - ONEDRIVE_REFRESH_TOKEN=${ONEDRIVE_REFRESH_TOKEN:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - DB_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; s=os.stat('/tmp/assistant-healthy'); exit(0 if time.time()-s.st_mtime<90 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src/tools/plugins:/app/src/tools/plugins
      - ./src/user_skills:/app/src/user_skills
      - config_data:/app/config
      - backups_data:/app/backups
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ─── PostgreSQL (Memory, Jobs, Audit) ───
  postgres:
    image: postgres:17-alpine
    container_name: assistant-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=assistant
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Qdrant (Vector Embeddings) ───
  qdrant:
    image: qdrant/qdrant:latest
    container_name: assistant-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── Google Workspace MCP Server ───
  #
  # Persistence configuration (added 2026-04-26):
  # The upstream image's Linux defaults make tokens look persistent but they
  # aren't:
  #   - WORKSPACE_MCP_OAUTH_PROXY_STORAGE_BACKEND defaults to "memory" — proxy
  #     state is wiped on container restart, forcing every connected user
  #     back through `/connect google` after every rebuild.
  #   - WORKSPACE_MCP_CREDENTIALS_DIR defaults to ~/.google_workspace_mcp/...
  #     which lives on the container's writable layer (not our volume).
  #   - The Fernet key used to encrypt persisted tokens defaults to a value
  #     derived from GOOGLE_OAUTH_CLIENT_SECRET — fine until you rotate it,
  #     after which the previously-encrypted tokens become unreadable.
  #
  # We pin all three explicitly so the named `workspace_tokens` volume actually
  # holds the data, the disk backend is on, and the Fernet key is independent
  # of the OAuth client secret. This closes the heartbeat-induced false-positive
  # nudge storm that would otherwise hit every user on `docker compose up
  # --build` (see docs/RUNBOOK.md and src/scheduler/maintenance.py).
  workspace-mcp:
    image: ghcr.io/taylorwilsdon/google_workspace_mcp:latest
    container_name: workspace-mcp
    restart: unless-stopped
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=http://127.0.0.1:8083/oauth2callback
      - OAUTHLIB_INSECURE_TRANSPORT=1
      # Fernet signing key. Generate ONCE with `openssl rand -hex 32`
      # and store in .env. NEVER rotate without first re-issuing /connect
      # google to all users — rotation invalidates every persisted token.
      - FASTMCP_SERVER_AUTH_GOOGLE_JWT_SIGNING_KEY=${WORKSPACE_MCP_SIGNING_KEY:-}
      # Force the disk backend so OAuth-proxy state survives restarts.
      - WORKSPACE_MCP_OAUTH_PROXY_STORAGE_BACKEND=disk
      - WORKSPACE_MCP_OAUTH_PROXY_DISK_DIRECTORY=/data/oauth-proxy
      # Pin the credentials dir to the same volume so encrypted token JSON
      # files land where we mount, not on the container's writable layer.
      - WORKSPACE_MCP_CREDENTIALS_DIR=/data/credentials
    volumes:
      # Named volume covers BOTH /data/credentials and /data/oauth-proxy.
      - workspace_tokens:/data
      - ./src/integrations/workspace_mcp_oauth_responses_override.py:/app/auth/oauth_responses.py:ro
    ports:
      - "127.0.0.1:8083:8000"

  # ─── Redis (Cache, Sessions, Rate Limiting) ───
  redis:
    image: redis:7-alpine
    container_name: assistant-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Atlas Dashboard API ───
  orchestration-api:
    build:
      context: .
      dockerfile: Dockerfile.orchestration
    container_name: personal-assistant-orchestration
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://assistant:${DB_PASSWORD}@postgres:5432/assistant
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OWNER_TELEGRAM_ID=${OWNER_TELEGRAM_ID}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src/user_skills:/app/src/user_skills
      - ./src/tools/plugins:/app/src/tools/plugins

  # ─── Orchestration Web UI ───
  orchestration-ui:
    build:
      context: ./src/orchestration-ui
      dockerfile: Dockerfile
    container_name: personal-assistant-ui
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - orchestration-api

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  config_data:
  workspace_tokens:
  backups_data:

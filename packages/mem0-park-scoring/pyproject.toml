[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mem0-park-scoring"
version = "0.1.0"
description = "Park et al. 2023 (Generative Agents) eviction scoring for Mem0-backed memory stores."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Atlas (PersonalAsst) contributors" }]
keywords = ["mem0", "memory", "eviction", "generative-agents", "park-2023", "agents", "llm"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/llores28/PersonalAsst"
Source = "https://github.com/llores28/PersonalAsst/tree/main/packages/mem0-park-scoring"

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]
